    concurrent: 10
    tasks:
      - id: verify_kv_exists
        type: io.kestra.plugin.core.kv.Get
        key: "{{ taskrun.value }}"
        namespace: company.wind

      - id: year_loop
        type: io.kestra.plugin.core.flow.EachParallel
        value:
          - "2006"
          - "2007"
          - "2008"
          - "2009"
          - "2010"
          - "2011"
          - "2012"
          - "2013"
          - "2014"
          - "2015"
          - "2016"
          - "2017"
          - "2018"
          - "2019"
          - "2020"
          - "2021"
          - "2022"
          - "2023"
          - "2024"
        concurrent: 8
        tasks:
          - id: run_site_ingestion
            type: io.kestra.plugin.core.flow.Subflow
            flowId: site_data_ingestion
            namespace: company.wind
            inputs:
              site: "{{ parents[0].taskrun.value }}"
              start_date: "{{ taskrun.value }}-01-01"
              end_date: "{{ taskrun.value }}-12-31"
            wait: true
            transmitFailed: true
            allowFailure: true
            retry:
              type: constant
              interval: PT30S
              maxAttempt: 3

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: "❌ Backfill failed — check individual subflow executions for details"