id: site_data_backfill
namespace: company.wind

description: |
  One-time historical backfill for 14 Mediterranean sites from 2006 to 2024.
  Fetches hourly wind (ERA5) and wave (Marine API) data via site_data_ingestion subflow.
  Runs 4 years concurrently per site. Uses WRITE_APPEND — safe to accumulate data across sites.
  WARNING: Do not re-run without truncating BigQuery tables first to avoid duplicates.

labels:
  type: backfill
  env: prod

tasks:
  - id: site_loop
    type: io.kestra.plugin.core.flow.EachSequential
    value:
      - "GULF_OF_LYON"
      - "AEGEAN_SEA"
      - "ALBORAN_SEA"
      - "BALEARIC_SEA"
      - "COSTA_BRAVA"
      - "CYPRUS_COAST"
      - "EBRO_DELTA"
      - "GULF_OF_VALENCIA"
      - "IONIAN_SEA"
      - "LEVANTINE_SEA"
      - "LIBYAN_COAST"
      - "NORTH_ADRIATIC_SEA"
      - "STRAIT_OF_SICILY"
      - "TYRRHENIAN_SEA"
    tasks:

      - id: verify_kv_exists
        type: io.kestra.plugin.core.kv.Get
        key: "{{ taskrun.value }}"
        namespace: company.wind

      - id: year_loop
        type: io.kestra.plugin.core.flow.EachParallel
        value:
          - "2006"
          - "2007"
          - "2008"
          - "2009"
          - "2010"
          - "2011"
          - "2012"
          - "2013"
          - "2014"
          - "2015"
          - "2016"
          - "2017"
          - "2018"
          - "2019"
          - "2020"
          - "2021"
          - "2022"
          - "2023"
          - "2024"
        concurrent: 4
        tasks:
          - id: run_site_ingestion
            type: io.kestra.plugin.core.flow.Subflow
            flowId: site_data_ingestion
            namespace: company.wind
            inputs:
              site: "{{ parents[0].taskrun.value }}"
              start_date: "{{ taskrun.value }}-01-01"
              end_date: "{{ taskrun.value }}-12-31"
            wait: true
            transmitFailed: true
            allowFailure: true
            retry:
              type: constant
              interval: PT30S
              maxAttempt: 3

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: "❌ Backfill failed — check individual subflow executions for details"