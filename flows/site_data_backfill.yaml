id: site_data_backfill
namespace: company.wind

description: |
  Historical backfill for 111 Gulf of Lion grid points from 2006 to 2024.
  Fetches hourly wind (ERA5) and wave (Marine API) data via site_data_ingestion subflow.
  Runs 10 sites and 4 years concurrently. Uses WRITE_APPEND — safe to accumulate data.
  WARNING: Do not re-run without truncating BigQuery tables first to avoid duplicates.

labels:
  type: backfill
  env: prod

tasks:
  - id: site_loop
    type: io.kestra.plugin.core.flow.EachParallel
    value:
      - "GULF_OF_LION_40.5_2.5"
